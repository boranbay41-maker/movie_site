{% extends 'base.html' %}

{% block content %}
    <h1>Результаты поиска</h1>
    <p>Найдено {{ kinolar|length }} фильмов.</p>
    <div class="movie-list">
        {% for movie in kinolar %}
            <div class="movie-item">
                <h2>{{ movie.title }}</h2>
                <p>{{ movie.desc }}</p>
            </div>
        {% endfor %}
    </div>
{% endblock %}
